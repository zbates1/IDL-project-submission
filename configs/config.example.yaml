# =============================================================================
# CMU.49.012 IDL Course Project - Example Configuration
# =============================================================================
#
# This is a fully documented example configuration file. Copy this file to
# config.yaml and modify the values for your experiment.
#
#   cp configs/config.example.yaml configs/config.yaml
#
# IMPORTANT:
#   - API keys and secrets do NOT go here. Use .secrets.yaml (gitignored).
#   - All values below are sensible defaults; override per experiment.
#   - CLI overrides use dot-notation: --override training.lr=0.01
#
# =============================================================================

# -- Project metadata --------------------------------------------------------
# Identifies the project and links to the experiment tracking system.
# experiment_id should match an entry in _experiments/registry.yaml.
project:
  name: "CMU.49.012"                # Course project identifier (do not change)
  experiment_id: "CMU.87.XXX"       # Replace XXX with your experiment number
                                    # e.g., "CMU.87.001" for your first experiment

# -- Model configuration ----------------------------------------------------
# Controls which model architecture to use and its constructor arguments.
# arch_id must match a registered model in src/models/registry.py.
# params are passed as **kwargs to the model constructor.
#
# Example with custom params:
#   model:
#     arch_id: "resnet18_custom"
#     params:
#       num_classes: 10
#       dropout: 0.3
model:
  arch_id: "baseline"               # Registry key - must match @register("...") decorator
  params: {}                        # Model-specific kwargs (empty = use model defaults)

# -- Training configuration -------------------------------------------------
# Controls the training loop behavior including optimization, scheduling,
# early stopping, and checkpointing.
training:
  epochs: 50                        # Maximum number of training epochs
                                    # Early stopping may end training sooner

  batch_size: 256                   # Number of samples per training batch
                                    # Reduce if you run out of GPU memory

  # Optimizer settings
  # Supported: any optimizer from torch.optim (Adam, AdamW, SGD, etc.)
  optimizer:
    name: "AdamW"                   # Optimizer class name from torch.optim
    lr: 0.001                       # Base learning rate
    weight_decay: 0.01              # L2 regularization (0.0 to disable)

  # Learning rate scheduler settings
  # Supported: any scheduler from torch.optim.lr_scheduler
  # OneCycleLR is recommended for fast convergence
  scheduler:
    name: "OneCycleLR"              # LR scheduler class name
    max_lr: 0.001                   # Peak learning rate (for OneCycleLR)
                                    # Other schedulers may use different params

  # Automatic Mixed Precision (AMP)
  # Uses float16 for forward pass, float32 for gradients
  # Speeds up training on GPUs with Tensor Cores (V100, A100, etc.)
  amp: true                         # Set false if you encounter NaN losses

  # Early stopping configuration
  # Stops training if the monitored metric does not improve for 'patience' epochs
  early_stopping:
    patience: 10                    # Number of epochs to wait for improvement
    metric: "val_accuracy"          # Which metric to monitor
                                    # Common choices: "val_accuracy", "val_loss"
    mode: "max"                     # "max" = higher is better (accuracy)
                                    # "min" = lower is better (loss)

  # Checkpoint configuration
  # Checkpoints are saved to the checkpoints/ directory
  checkpoint:
    save_best: true                 # Always save the model with the best val metric
    save_every: 10                  # Additionally save a checkpoint every N epochs
                                    # Set to 0 or null to disable periodic saves

# -- Data configuration -----------------------------------------------------
# Controls data loading and preprocessing.
# The specific dataset class is determined by the task (subclass BaseDataset).
data:
  root: "data/"                     # Path to dataset root directory
                                    # Can be absolute or relative to project root
  num_workers: 4                    # Number of parallel DataLoader workers
                                    # Set to 0 for debugging (sequential loading)
  pin_memory: true                  # Pin tensors in CPU memory for faster GPU transfer
                                    # Set false if not using GPU

# -- Weights & Biases configuration -----------------------------------------
# W&B provides experiment tracking, metric logging, and artifact storage.
# You must have a W&B account and API key in .secrets.yaml.
#
# .secrets.yaml format:
#   wandb:
#     api_key: "your-api-key-here"
#     entity: "your-username-or-team"
wandb:
  project: "cmu_49_012_idl_course_project"  # W&B project name (created automatically)
  entity: null                      # W&B team or username
                                    # Loaded from .secrets.yaml at runtime
  tags: []                          # Tags for organizing runs in the W&B dashboard
                                    # Example: ["baseline", "lr-sweep"]
  log_model: true                   # Upload best model checkpoint as a W&B artifact
                                    # Enables model versioning and comparison

# -- Export configuration ----------------------------------------------------
# Controls how figures and results are saved locally.
# Exports are managed by ExportManager with manifest tracking.
# Directory structure: exports/{experiment_id}/{timestamp}/
export:
  base_dir: "exports/"              # Root directory for all exports
                                    # Subdirectories created automatically
  save_svg: true                    # Save figures as SVG (vector, publication-quality)
                                    # This is the primary export format
  save_png: false                   # Save figures as PNG (raster, for presentations)
                                    # Set true if you need PNG alongside SVG
